{% extends "base.html" %}
{% block title %}Аккаунт заблокирован{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;text-align:center">
    <div class="card" style="max-width:420px;padding:48px 32px">
        <div style="width:64px;height:64px;border-radius:50%;background:rgba(248,113,113,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px">
            🚫
        </div>
        <h1 style="font-size:22px;font-weight:700;margin-bottom:10px" class="text-gradient">Аккаунт заблокирован</h1>
        <p style="color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:28px">
            {{ reason | default("Администратор заблокировал аккаунт. Считаете, что ошибка — напишите куратору.") }}
        </p>

        <a href="/"
           style="display:flex;align-items:center;justify-content:center;gap:8px;
                  background:var(--accent-soft);color:var(--accent);padding:13px 24px;border-radius:10px;
                  font-size:15px;font-weight:700;text-decoration:none;
                  border:1.5px solid rgba(37,99,235,0.2);
                  transition:background 0.2s,transform 0.15s"
           onmouseover="this.style.background='#dbeafe';this.style.transform='translateY(-1px)'"
           onmouseout="this.style.background='var(--accent-soft)';this.style.transform='translateY(0)'">
            На главную
        </a>
    </div>
</div>
{% endblock %}
