{% extends "base.html" %}
{% block title %}Вход для сотрудников{% endblock %}
{% block extra_styles %}
<style>
body { background: linear-gradient(160deg, #E8ECF6 0%, #DDE3F2 100%); }
.staff-wrap {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 80vh; padding: 24px 16px;
}
.staff-card {
    width: 100%; max-width: 420px;
    background: #fff; border-radius: 24px;
    box-shadow: 0 4px 32px rgba(30,45,107,0.11);
    padding: 36px 32px;
}
.staff-icon {
    width: 60px; height: 60px; border-radius: 18px;
    background: linear-gradient(135deg,#1E2D6B,#3B4FC8);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 26px;
}
.staff-title {
    font-size: 22px; font-weight: 900; letter-spacing: -0.4px;
    color: var(--text); text-align: center; margin-bottom: 6px;
}
.staff-sub {
    font-size: 13px; color: var(--dim); text-align: center;
    margin-bottom: 28px; line-height: 1.5;
}
.staff-field { margin-bottom: 16px; }
.staff-field label {
    display: block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--dim); margin-bottom: 6px;
}
.staff-input {
    width: 100%; padding: 13px 16px;
    border: 1.5px solid var(--border); border-radius: 12px;
    background: var(--surface); color: var(--text);
    font-size: 15px; font-family: 'Montserrat', sans-serif;
    transition: border-color 0.2s;
    box-sizing: border-box;
}
.staff-input:focus { outline: none; border-color: var(--accent); }
.staff-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg,#1E2D6B,#3B4FC8);
    color: #fff; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700;
    font-family: 'Montserrat', sans-serif;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s, transform 0.15s;
}
.staff-btn:hover { opacity: 0.92; transform: translateY(-1px); }
.back-link {
    display: block; text-align: center; margin-top: 20px;
    font-size: 13px; color: var(--dim); text-decoration: none;
}
.back-link:hover { color: var(--accent); opacity: 1; }
</style>
{% endblock %}
{% block content %}
<div class="staff-wrap">
    <div class="staff-card">
        <div class="staff-icon">🔒</div>
        <div class="staff-title">Вход для сотрудников</div>
        <div class="staff-sub">Куратор, администратор</div>

        {% if error %}
        <div class="alert alert-error" style="margin-bottom:20px">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="staff-field">
                <label for="staff-login">Логин</label>
                <input id="staff-login" type="text" name="login" class="staff-input"
                       placeholder="Введите логин" autocomplete="username"
                       autofocus required>
            </div>
            <div class="staff-field">
                <label for="staff-password">Пароль</label>
                <input id="staff-password" type="password" name="password" class="staff-input"
                       placeholder="Введите пароль" autocomplete="current-password"
                       required>
            </div>
            <button type="submit" class="staff-btn">Войти</button>
        </form>

        <a href="/" class="back-link">← Вернуться на главную</a>
    </div>
</div>
{% endblock %}
